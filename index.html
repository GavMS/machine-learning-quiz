<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML Practice Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        body: ['DM Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <script src="script.js" defer></script>
</head>
<body class="font-body antialiased p-4">
    <div class="w-full max-w-2xl main-card rounded-2xl p-6 md:p-10 relative overflow-y-auto max-h-[95vh] z-10">

        <!-- START SCREEN -->
        <div id="start-screen" class="screen active">
            <div class="text-center">
                <h1 class="text-2xl md:text-4xl font-bold mb-2 text-[#1a1a2e] leading-tight">Machine Learning</h1>
                <p class="text-sm text-[#0f4c75] font-semibold tracking-wide uppercase mb-1">Practice Exam</p>
                <p class="text-slate-500 text-sm mb-8 max-w-md mx-auto">Uji pemahaman konsep Machine Learning. Pilih tingkat kesulitan untuk memulai.</p>

                <div class="flex flex-col sm:flex-row gap-3 mb-8 max-w-sm mx-auto">
                    <button onclick="startQuiz('easy')" class="btn-easy flex-1 py-3.5 rounded-xl font-semibold text-sm flex items-center justify-center gap-2">
                        Easy
                    </button>
                    <button onclick="startQuiz('hard')" class="btn-hard flex-1 py-3.5 rounded-xl font-semibold text-sm flex items-center justify-center gap-2">
                        Hard
                    </button>
                </div>

                <div class="history-card rounded-xl p-4 text-left">
                    <h3 class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-3">Riwayat Skor</h3>
                    <ul id="score-history" class="text-sm space-y-2">
                        <li class="text-slate-400 italic text-xs">Belum ada riwayat...</li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- QUIZ SCREEN -->
        <div id="quiz-screen" class="screen">
            <header class="flex justify-between items-center mb-5">
                <span id="mode-label" class="badge badge-easy">EASY</span>
                <div class="text-slate-400 text-sm font-semibold" id="progress-label">1 / 10</div>
            </header>
            <div class="progress-track mb-6">
                <div id="progress-bar" class="progress-fill" style="width: 0%"></div>
            </div>

            <!-- Loading state -->
            <div id="quiz-loading" class="hidden flex flex-col items-center justify-center py-16">
                <div class="loader mb-4"></div>
                <p class="text-slate-400 text-sm">Memuat soal...</p>
            </div>

            <main id="quiz-content">
                <div id="question-container">
                    <p class="text-xs font-semibold text-[#0f4c75] uppercase tracking-wider mb-2" id="question-number">Soal 1</p>
                    <h2 id="question-text" class="text-base md:text-lg font-semibold mb-6 text-[#1a1a2e] leading-relaxed">Question Text</h2>
                    <div id="options-container" class="space-y-2.5"></div>
                </div>
                <div class="flex justify-end mt-8">
                    <button id="next-btn" class="hidden items-center gap-2 btn-primary px-6 py-3 rounded-xl font-semibold text-sm">
                        <span id="next-btn-text">Selanjutnya</span>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path></svg>
                    </button>
                </div>
            </main>
        </div>

        <!-- RESULTS SCREEN -->
        <div id="results-screen" class="screen">
            <div class="text-center">
                <p class="text-xs font-semibold text-[#0f4c75] uppercase tracking-wider mb-4">Hasil Ujian</p>
                <h2 class="text-2xl font-bold text-[#1a1a2e] mb-6">Ujian Selesai!</h2>

                <div class="bg-[#f8f9fb] rounded-xl p-6 mb-6 border border-[#e9ecef]">
                    <div class="score-ring mb-4">
                        <span class="text-3xl font-bold text-[#1a1a2e]" id="final-score-text">0%</span>
                    </div>
                    <p class="text-xs text-slate-400 uppercase tracking-wider font-semibold mt-2">Akurasi</p>
                    <div class="progress-track mt-3">
                        <div id="final-progress-bar" class="progress-fill" style="width: 0%"></div>
                    </div>
                </div>

                <div class="bg-white rounded-xl p-4 mb-6 border border-[#e9ecef] text-left overflow-y-auto max-h-72" id="explanations-container">
                    <!-- Answers and Explanations injected here -->
                </div>

                <button onclick="resetQuiz()" class="w-full py-3.5 rounded-xl font-semibold text-sm btn-primary flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Kembali ke Beranda
                </button>
            </div>
        </div>
    </div>
</body>
</html>
